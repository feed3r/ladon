name: Docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ladon with docs dependencies
        run: pip install -e ".[docs]"

      - name: Build docs (strict)
        run: mkdocs build --strict
